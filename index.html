<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Womfly Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- From Uiverse.io by jaykdoe --> 


    <div id="main-wrapper">
    <header id="sticky-header">
        <div class="header-logo">
            <img src="media/logoblanco-pequeno.png" alt="Womfly Mini">
        </div>
        <script type="text/javascript" src="https://grwapi.net/widget.min.js" async></script>
<div class="review-widget_net" data-uuid="7c414505-22e0-43db-8db5-ee127fa5ac2b" data-template="2" data-lang="en" data-theme="light"></div>
        <nav class="header-links">
            <a href="https://booksy.com/es-es/172778_womfly_cuidado-de-la-piel_26527_pago-del-humo?do=invite&_branch_match_id=1582304734177509730&utm_medium=profile_share_from_boost&_branch_referrer=H4sIAAAAAAAAA8soKSkottLXT07J0UvKz88urtRLzs%2FVr8i1dEwpKrQoMkyyrytKTUstKsrMS49PKsovL04tsnVNSU8FALG23JM6AAAA#ba_s=seo">Booksy</a>
            <a><script type="text/javascript" src="https://booksy.com/widget/code.js?id=172778&country=es&lang=es"></script></a>
        </nav>
    </header>


    <div class="container">
  <div id="stars"></div>
  <div id="stars2"></div>
  <div id="stars3"></div>
  <div></div>

    <section class="hero" id="hero-trigger">
        <div class="hero-content">
            
            <div class="logo-with-butterflies" id="logo-trigger">
                <div class="hero-logo-text animate-fade">WOMFLY</div>
                <img src="media/Womfly.png" alt="Womfly Logo" class="main-logo animate-fade">
                
                <div class="butterfly-wrapper btf-1" id="btf-1">
                    <div class="butterfly-body"></div>
                    <div class="wing wing-l"></div>
                    <div class="wing wing-r"></div>
                </div>

                <div class="butterfly-wrapper btf-2" id="btf-2">
                    <div class="butterfly-body"></div>
                    <div class="wing wing-l"></div>
                    <div class="wing wing-r"></div>
                </div>
                
            </div>
            
            <p class="hero-subtitle animate-fade delay-1">Dos empresas, un mismo objetivo</p>
        </div>
        
        <div class="brands-preview animate-fade delay-2">
            <img src="media/logo-kalon.png" alt="Kalon Logo">
            <img src="media/logo-olivalolo.png" alt="Olivalolo Logo">
        </div>
    </section>

    <section class="exhibitor-section" id="exhibitor-section">
    <div class="exhibitor-container">
        
        <div class="exhibitor-text-side">
            <div class="exhibitor-info" id="info-column">
                <h2 id="accent-title">Nuestro Trabajo</h2>
                <div class="info-content" id="info-content-wrapper">
                    <p class="description" id="project-desc">
                        Explora nuestras colaboraciones a través de este catálogo interactivo.
                    </p>
                    <span class="instruction" id="project-client">Haz clic en las alas para navegar</span>
                </div>
            </div>

            <div class="exhibitor-info extra-info-note" id="extra-info-column" style="display: none; opacity: 0;">
                <h2>Detalles</h2>
                <div class="info-content">
                    <p class="description" id="project-extra-desc">
                        </p>
                </div>
            </div>
        </div>

        <div class="exhibitor-interactive">
            <div class="butterfly-exhibitor-wrapper" id="main-butterfly">
                <div class="exhibitor-wing exhibitor-wing-left" id="wing-l">
                    <div class="exhibitor-wing-inner">
                        <img id="img-left" src="media/fotodual.jpeg" alt="Portfolio Izq">
                    </div>
                </div>
                <div class="exhibitor-butterfly-body" id="butterfly-core"></div>    
                <div class="exhibitor-wing exhibitor-wing-right" id="wing-r">
                    <div class="exhibitor-wing-inner">
                        <img id="img-right" src="media/logo-grande.png" alt="Portfolio Der">
                    </div>
                </div>
            </div>
        </div>

    </div>
    </div>
</section>

</div>
